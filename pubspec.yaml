name: porasona_plus
description: "Porasona Plus - Online Learning Platform for Students"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3

  # State management
  provider: ^6.1.2

  # Payments
  razorpay_flutter: ^1.3.7

  # Local storage / offline support
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.5
  path_provider: ^2.1.4

  # Media / viewers
  video_player: ^2.9.1
  chewie: ^1.8.5
  syncfusion_flutter_pdfviewer: ^29.2.14
  cached_network_image: ^3.4.1
  flutter_downloader: ^1.11.8

  # UI / UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  fl_chart: ^0.69.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  percent_indicator: ^4.2.3
  flutter_rating_bar: ^4.0.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo.png
