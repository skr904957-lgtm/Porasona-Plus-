name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$(dirname $(dirname $(which flutter)))" >> android/local.properties
      - run: |
          mkdir -p /tmp/gw
          cd /tmp/gw
          touch settings.gradle
          gradle wrapper --gradle-version 8.4 --distribution-type all
          cp -r gradle "$GITHUB_WORKSPACE/android/"
          cp gradlew "$GITHUB_WORKSPACE/android/"
          cp gradlew.bat "$GITHUB_WORKSPACE/android/"
          chmod +x "$GITHUB_WORKSPACE/android/gradlew"
      - run: flutter pub get
      - run: |
          find ~/.pub-cache -path "*package_info_plus*/android/build.gradle" -exec sed -i '/^android {/a\    compileSdk 35' {} \;
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
